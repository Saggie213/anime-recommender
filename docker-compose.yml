version: '3.8'

services:
  ml-service:
    build: ./ml-service
    container_name: anime-ml-service
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  backend:
    build: ./backend
    container_name: anime-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=anime_recommender_secure_secret_key_12345!
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - ml-service
    restart: always

  frontend:
    build: ./frontend
    container_name: anime-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    restart: always
